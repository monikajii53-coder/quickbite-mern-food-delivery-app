<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Admin Panel — QuickBite</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Clash+Display:wght@400;500;600;700&family=Nunito:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet"/>
  <link rel="stylesheet" href="../css/style.css"/>
</head>
<body class="admin-body">

<div class="admin-layout">
  <!-- Sidebar -->
  <aside class="admin-sidebar" id="admin-sidebar">
    <div class="as-brand">🍔 <strong>QuickBite</strong><span>Admin</span></div>
    <nav class="as-nav">
      <button class="asn-btn active" onclick="showAdminTab('dashboard',this)"><i class="bi bi-speedometer2"></i> Dashboard</button>
      <button class="asn-btn" onclick="showAdminTab('restaurants',this)"><i class="bi bi-shop"></i> Restaurants</button>
      <button class="asn-btn" onclick="showAdminTab('menu',this)"><i class="bi bi-menu-button-wide"></i> Menu Items</button>
      <button class="asn-btn" onclick="showAdminTab('orders',this)"><i class="bi bi-bag-check"></i> Orders</button>
      <button class="asn-btn" onclick="showAdminTab('users',this)"><i class="bi bi-people"></i> Users</button>
    </nav>
    <div class="as-footer">
      <a href="../index.html" class="asn-btn"><i class="bi bi-house"></i> Back to Site</a>
      <button class="asn-btn text-danger" onclick="logout()"><i class="bi bi-box-arrow-right"></i> Logout</button>
    </div>
  </aside>

  <!-- Main -->
  <main class="admin-main">
    <div class="admin-topbar">
      <button class="sidebar-toggle" onclick="toggleSidebar()"><i class="bi bi-list"></i></button>
      <h2 class="at-title" id="at-title">Dashboard</h2>
      <div class="at-user" id="at-user"></div>
    </div>

    <div class="admin-content" id="admin-content">

      <!-- DASHBOARD -->
      <div class="atab active" id="atab-dashboard">
        <div class="row g-3 mb-4" id="stat-cards">
          <div class="col-6 col-lg-3"><div class="stat-card sc-orange"><div class="sc-icon"><i class="bi bi-people-fill"></i></div><div class="sc-val" id="sc-users">—</div><div class="sc-label">Total Users</div></div></div>
          <div class="col-6 col-lg-3"><div class="stat-card sc-green"><div class="sc-icon"><i class="bi bi-shop"></i></div><div class="sc-val" id="sc-restaurants">—</div><div class="sc-label">Restaurants</div></div></div>
          <div class="col-6 col-lg-3"><div class="stat-card sc-blue"><div class="sc-icon"><i class="bi bi-bag-check"></i></div><div class="sc-val" id="sc-orders">—</div><div class="sc-label">Total Orders</div></div></div>
          <div class="col-6 col-lg-3"><div class="stat-card sc-purple"><div class="sc-icon"><i class="bi bi-currency-dollar"></i></div><div class="sc-val" id="sc-revenue">—</div><div class="sc-label">Revenue</div></div></div>
        </div>
        <div class="admin-card">
          <div class="admin-card-head"><h5>Recent Orders</h5></div>
          <div id="recent-orders-table"></div>
        </div>
      </div>

      <!-- RESTAURANTS -->
      <div class="atab d-none" id="atab-restaurants">
        <div class="admin-card-head mb-3">
          <h5>Manage Restaurants</h5>
          <button class="btn-qb-primary btn-sm-qb" onclick="openRestaurantModal()"><i class="bi bi-plus-lg"></i> Add Restaurant</button>
        </div>
        <div class="admin-card">
          <div id="restaurants-table"></div>
        </div>
      </div>

      <!-- MENU -->
      <div class="atab d-none" id="atab-menu">
        <div class="admin-card-head mb-3">
          <h5>Manage Menu Items</h5>
          <button class="btn-qb-primary btn-sm-qb" onclick="openMenuModal()"><i class="bi bi-plus-lg"></i> Add Item</button>
        </div>
        <div class="admin-card">
          <div id="menu-table"></div>
        </div>
      </div>

      <!-- ORDERS -->
      <div class="atab d-none" id="atab-orders">
        <div class="admin-card-head mb-3"><h5>All Orders</h5></div>
        <div class="admin-card">
          <div id="orders-table"></div>
        </div>
      </div>

      <!-- USERS -->
      <div class="atab d-none" id="atab-users">
        <div class="admin-card-head mb-3"><h5>Registered Users</h5></div>
        <div class="admin-card">
          <div id="users-table"></div>
        </div>
      </div>

    </div>
  </main>
</div>

<!-- Restaurant Modal -->
<div class="modal fade" id="restaurantModal" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered modal-lg">
    <div class="modal-content qb-modal">
      <div class="modal-header">
        <h5 class="modal-title" id="rm-title">Add Restaurant</h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <input type="hidden" id="rm-id"/>
        <div class="row g-3">
          <div class="col-md-6"><label class="qb-label">Name *</label><input class="qb-input" id="rm-name" placeholder="Restaurant Name"/></div>
          <div class="col-md-6"><label class="qb-label">Cuisine *</label><input class="qb-input" id="rm-cuisine" placeholder="Italian, Indian..."/></div>
          <div class="col-12"><label class="qb-label">Description</label><input class="qb-input" id="rm-desc" placeholder="Short description"/></div>
          <div class="col-12"><label class="qb-label">Image URL</label><input class="qb-input" id="rm-image" placeholder="https://..."/></div>
          <div class="col-md-6"><label class="qb-label">Delivery Time</label><input class="qb-input" id="rm-time" placeholder="30-45 min"/></div>
          <div class="col-md-6"><label class="qb-label">Delivery Fee ($)</label><input class="qb-input" type="number" id="rm-fee" placeholder="2.99"/></div>
          <div class="col-md-6"><label class="qb-label">Min Order ($)</label><input class="qb-input" type="number" id="rm-min" placeholder="10"/></div>
          <div class="col-md-6"><label class="qb-label">Rating (1-5)</label><input class="qb-input" type="number" id="rm-rating" min="1" max="5" step="0.1" placeholder="4.5"/></div>
          <div class="col-12"><label class="qb-label">Address</label><input class="qb-input" id="rm-address" placeholder="123 Food Street"/></div>
        </div>
        <div id="rm-error" class="qb-error d-none mt-3"></div>
      </div>
      <div class="modal-footer border-0">
        <button class="btn-qb-outline" data-bs-dismiss="modal">Cancel</button>
        <button class="btn-qb-primary" onclick="saveRestaurant()">Save Restaurant</button>
      </div>
    </div>
  </div>
</div>

<!-- Menu Item Modal -->
<div class="modal fade" id="menuModal" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered modal-lg">
    <div class="modal-content qb-modal">
      <div class="modal-header">
        <h5 class="modal-title" id="mm-title">Add Menu Item</h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <input type="hidden" id="mm-id"/>
        <div class="row g-3">
          <div class="col-12">
            <label class="qb-label">Restaurant *</label>
            <select class="qb-input" id="mm-restaurant"></select>
          </div>
          <div class="col-md-6"><label class="qb-label">Item Name *</label><input class="qb-input" id="mm-name" placeholder="e.g. Margherita Pizza"/></div>
          <div class="col-md-6"><label class="qb-label">Category *</label><input class="qb-input" id="mm-category" placeholder="e.g. Pizzas, Drinks"/></div>
          <div class="col-12"><label class="qb-label">Description</label><input class="qb-input" id="mm-desc" placeholder="Describe the dish..."/></div>
          <div class="col-md-6"><label class="qb-label">Price ($) *</label><input class="qb-input" type="number" id="mm-price" placeholder="9.99" step="0.01"/></div>
          <div class="col-md-6"><label class="qb-label">Image URL</label><input class="qb-input" id="mm-image" placeholder="https://..."/></div>
          <div class="col-md-4 d-flex align-items-center gap-2 pt-3">
            <input type="checkbox" id="mm-veg" class="form-check-input qb-check"/>
            <label for="mm-veg" class="qb-label mb-0">Vegetarian</label>
          </div>
          <div class="col-md-4 d-flex align-items-center gap-2 pt-3">
            <input type="checkbox" id="mm-bestseller" class="form-check-input qb-check"/>
            <label for="mm-bestseller" class="qb-label mb-0">Bestseller</label>
          </div>
          <div class="col-md-4 d-flex align-items-center gap-2 pt-3">
            <input type="checkbox" id="mm-available" class="form-check-input qb-check" checked/>
            <label for="mm-available" class="qb-label mb-0">Available</label>
          </div>
        </div>
        <div id="mm-error" class="qb-error d-none mt-3"></div>
      </div>
      <div class="modal-footer border-0">
        <button class="btn-qb-outline" data-bs-dismiss="modal">Cancel</button>
        <button class="btn-qb-primary" onclick="saveMenuItem()">Save Item</button>
      </div>
    </div>
  </div>
</div>

<!-- Confirm Delete Modal -->
<div class="modal fade" id="deleteModal" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered modal-sm">
    <div class="modal-content qb-modal">
      <div class="modal-body text-center py-4">
        <div style="font-size:2.5rem">🗑️</div>
        <h5 class="mt-3">Delete this item?</h5>
        <p class="text-muted small" id="delete-msg">This action cannot be undone.</p>
        <div class="d-flex gap-2 justify-content-center mt-3">
          <button class="btn-qb-outline" data-bs-dismiss="modal">Cancel</button>
          <button class="btn-qb-danger" id="confirm-delete-btn">Delete</button>
        </div>
      </div>
    </div>
  </div>
</div>

<div class="qb-toast-wrap" id="toast-wrap"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="../js/api.js"></script>
<script src="../js/auth.js"></script>
<script src="../js/cart.js"></script>
<script src="../js/admin.js"></script>
</body>
</html>
