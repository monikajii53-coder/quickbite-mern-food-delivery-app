<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Restaurant — QuickBite</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Clash+Display:wght@400;500;600;700&family=Nunito:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet"/>
  <link rel="stylesheet" href="../css/style.css"/>
</head>
<body>
<nav class="qb-nav" id="qb-nav">
  <div class="qb-nav-inner">
    <a href="../index.html" class="qb-logo"><span class="logo-icon">🍔</span><span class="logo-text">Quick<strong>Bite</strong></span></a>
    <div class="qb-nav-right">
      <a href="cart.html" class="qb-nav-btn cart-btn" id="nav-cart-btn">
        <i class="bi bi-bag"></i>
        <span class="cart-count d-none" id="nav-cart-count">0</span>
      </a>
      <div id="nav-auth-area"></div>
    </div>
  </div>
</nav>

<div id="restaurant-page">
  <div class="restaurant-hero" id="r-hero">
    <div class="rh-overlay"></div>
    <div class="rh-content">
      <a href="../index.html" class="rh-back"><i class="bi bi-arrow-left"></i> Back</a>
      <div class="rh-info" id="rh-info">
        <div class="qb-spinner"></div>
      </div>
    </div>
  </div>

  <div class="container restaurant-body">
    <div class="row g-4">
      <!-- Menu -->
      <div class="col-lg-8">
        <div class="menu-category-nav" id="cat-nav"></div>
        <div id="menu-sections">
          <div class="text-center py-5"><div class="qb-spinner"></div></div>
        </div>
      </div>

      <!-- Cart Sidebar -->
      <div class="col-lg-4">
        <div class="cart-sidebar" id="cart-sidebar">
          <div class="cs-head">
            <h4><i class="bi bi-bag"></i> Your Order</h4>
            <span class="cs-restaurant" id="cs-restaurant-name"></span>
          </div>
          <div class="cs-empty" id="cs-empty">
            <div class="cse-icon">🛒</div>
            <p>Your cart is empty</p>
            <span>Add items from the menu</span>
          </div>
          <div class="cs-items" id="cs-items" style="display:none"></div>
          <div class="cs-total" id="cs-total" style="display:none">
            <div class="cst-row"><span>Subtotal</span><span id="cst-subtotal">$0.00</span></div>
            <div class="cst-row"><span>Delivery Fee</span><span id="cst-delivery">$0.00</span></div>
            <div class="cst-row total-row"><span>Total</span><span id="cst-total">$0.00</span></div>
            <button class="btn-qb-primary w-100 mt-3" onclick="goToCheckout()">
              Proceed to Checkout <i class="bi bi-arrow-right"></i>
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<div class="qb-toast-wrap" id="toast-wrap"></div>
<div class="modal fade" id="authModal" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content qb-modal">
      <div class="modal-header border-0 pb-0">
        <div class="modal-tabs">
          <button class="mt-btn active" id="tab-login" onclick="switchAuthTab('login')">Sign In</button>
          <button class="mt-btn" id="tab-register" onclick="switchAuthTab('register')">Create Account</button>
        </div>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body pt-2">
        <div id="form-login">
          <div class="auth-welcome"><h4>Welcome back! 👋</h4><p>Sign in to place your order</p></div>
          <div class="mb-3"><label class="qb-label">Email</label><input type="email" class="qb-input" id="login-email" placeholder="your@email.com"/></div>
          <div class="mb-3"><label class="qb-label">Password</label><input type="password" class="qb-input" id="login-password" placeholder="••••••••"/></div>
          <div id="login-error" class="qb-error d-none"></div>
          <button class="btn-qb-primary w-100" onclick="handleLogin()">Sign In</button>
        </div>
        <div id="form-register" class="d-none">
          <div class="auth-welcome"><h4>Join QuickBite! 🎉</h4></div>
          <div class="mb-3"><label class="qb-label">Full Name</label><input type="text" class="qb-input" id="reg-name" placeholder="Alex Johnson"/></div>
          <div class="mb-3"><label class="qb-label">Email</label><input type="email" class="qb-input" id="reg-email" placeholder="your@email.com"/></div>
          <div class="mb-3"><label class="qb-label">Phone</label><input type="tel" class="qb-input" id="reg-phone" placeholder="+1 234 567 8900"/></div>
          <div class="mb-3"><label class="qb-label">Password</label><input type="password" class="qb-input" id="reg-password" placeholder="Min 6 characters"/></div>
          <div id="reg-error" class="qb-error d-none"></div>
          <button class="btn-qb-primary w-100" onclick="handleRegister()">Create Account</button>
        </div>
      </div>
    </div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="../js/api.js"></script>
<script src="../js/auth.js"></script>
<script src="../js/cart.js"></script>
<script src="../js/restaurant.js"></script>
</body>
</html>
