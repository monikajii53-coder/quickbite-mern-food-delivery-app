<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>My Orders — QuickBite</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Clash+Display:wght@400;500;600;700&family=Nunito:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet"/>
  <link rel="stylesheet" href="../css/style.css"/>
</head>
<body>
<nav class="qb-nav" id="qb-nav">
  <div class="qb-nav-inner">
    <a href="../index.html" class="qb-logo"><span class="logo-icon">🍔</span><span class="logo-text">Quick<strong>Bite</strong></span></a>
    <div class="qb-nav-right">
      <a href="cart.html" class="qb-nav-btn cart-btn" id="nav-cart-btn">
        <i class="bi bi-bag"></i>
        <span class="cart-count d-none" id="nav-cart-count">0</span>
      </a>
      <div id="nav-auth-area"></div>
    </div>
  </div>
</nav>
<main class="orders-page">
  <div class="container">
    <div class="page-header">
      <a href="../index.html" class="back-link"><i class="bi bi-arrow-left"></i> Back to Home</a>
      <h1 class="page-title">My Orders 📦</h1>
    </div>
    <div id="orders-require-auth" class="d-none">
      <div class="big-empty-state">
        <div class="bes-emoji">🔒</div>
        <h2>Sign in to see your orders</h2>
        <p>You need to be logged in to view your order history.</p>
        <button class="btn-qb-primary" onclick="openAuthModal()">Sign In</button>
      </div>
    </div>
    <div id="orders-loading" class="text-center py-5"><div class="qb-spinner"></div></div>
    <div id="orders-empty" class="d-none">
      <div class="big-empty-state">
        <div class="bes-emoji">📭</div>
        <h2>No orders yet</h2>
        <p>You haven't placed any orders. Let's fix that!</p>
        <a href="../index.html" class="btn-qb-primary">Order Now</a>
      </div>
    </div>
    <div id="orders-list"></div>
  </div>
</main>
<div class="modal fade" id="authModal" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content qb-modal">
      <div class="modal-header border-0 pb-0">
        <div class="modal-tabs">
          <button class="mt-btn active" id="tab-login" onclick="switchAuthTab('login')">Sign In</button>
          <button class="mt-btn" id="tab-register" onclick="switchAuthTab('register')">Create Account</button>
        </div>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body pt-2">
        <div id="form-login">
          <div class="auth-welcome"><h4>Welcome back! 👋</h4></div>
          <div class="mb-3"><label class="qb-label">Email</label><input type="email" class="qb-input" id="login-email" placeholder="your@email.com"/></div>
          <div class="mb-3"><label class="qb-label">Password</label><input type="password" class="qb-input" id="login-password" placeholder="••••••••"/></div>
          <div id="login-error" class="qb-error d-none"></div>
          <button class="btn-qb-primary w-100" onclick="handleLogin()">Sign In</button>
        </div>
        <div id="form-register" class="d-none">
          <div class="auth-welcome"><h4>Join QuickBite! 🎉</h4></div>
          <div class="mb-3"><label class="qb-label">Name</label><input type="text" class="qb-input" id="reg-name"/></div>
          <div class="mb-3"><label class="qb-label">Email</label><input type="email" class="qb-input" id="reg-email"/></div>
          <div class="mb-3"><label class="qb-label">Phone</label><input type="tel" class="qb-input" id="reg-phone"/></div>
          <div class="mb-3"><label class="qb-label">Password</label><input type="password" class="qb-input" id="reg-password"/></div>
          <div id="reg-error" class="qb-error d-none"></div>
          <button class="btn-qb-primary w-100" onclick="handleRegister()">Create Account</button>
        </div>
      </div>
    </div>
  </div>
</div>
<div class="qb-toast-wrap" id="toast-wrap"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="../js/api.js"></script>
<script src="../js/auth.js"></script>
<script src="../js/cart.js"></script>
<script src="../js/orders.js"></script>
</body>
</html>
